name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  pull_request_hygiene:
    name: PR hygiene
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate PR title
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          PR_TITLE=$(gh api "repos/$REPOSITORY/pulls/$PR_NUMBER" --jq .title)
          echo "PR title: $PR_TITLE"
          if [[ ! "$PR_TITLE" =~ ^(feat|fix|docs|test|refactor|chore):\ .+ ]]; then
            echo "::error title=Invalid PR title::PR titles must start with feat:, fix:, docs:, test:, refactor:, or chore:."
            exit 1
          fi

      - name: Warn on large PRs
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          diff_lines=$(git diff --numstat "$BASE_SHA" "$HEAD_SHA" | awk '($1 != "-" && $2 != "-") { added += $1; deleted += $2 } END { print added + deleted + 0 }')
          echo "Changed lines: $diff_lines"
          if (( diff_lines > 600 )); then
            echo "::warning title=Large PR::This PR changes $diff_lines lines. Consider splitting it into smaller PRs."
          fi

      - name: Require tests when lib changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed_files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          if echo "$changed_files" | grep -q '^lib/'; then
            if ! echo "$changed_files" | grep -q '^test/'; then
              echo "::error title=Missing tests::This PR changes lib/ but does not touch test/."
              exit 1
            fi
          fi

  flutter:
    name: Analyze & test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: '3.41.x'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check dependency docs on pull requests
        if: github.event_name == 'pull_request'
        run: >
          dart run tool/check_dependency_docs.dart
          --base "${{ github.event.pull_request.base.sha }}"
          --head "${{ github.event.pull_request.head.sha }}"

      - name: Check dependency docs on pushes
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: >
          dart run tool/check_dependency_docs.dart
          --base "${{ github.event.before }}"
          --head "${{ github.sha }}"

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Static analysis
        run: flutter analyze --fatal-infos

      - name: Check assertion quality
        run: dart run tool/check_assertion_quality.dart

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Run tests with coverage
        run: flutter test --coverage --reporter=expanded

      - name: Check coverage ratchet on pull requests
        if: github.event_name == 'pull_request'
        run: >
          dart run tool/check_coverage.dart
          --base "${{ github.event.pull_request.base.sha }}"
          --head "${{ github.event.pull_request.head.sha }}"

      - name: Check coverage ratchet on pushes
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: >
          dart run tool/check_coverage.dart
          --base "${{ github.event.before }}"
          --head "${{ github.sha }}"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: ignore

  functions:
    name: Build Firebase Functions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: firebase/functions/package-lock.json

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Install Functions dependencies
        working-directory: firebase/functions
        run: npm ci

      - name: Build Functions
        working-directory: firebase/functions
        run: npm run build

      - name: Audit Functions dependencies
        working-directory: firebase/functions
        run: npm audit --audit-level=high

      - name: Test Functions
        working-directory: firebase/functions
        run: npm test

      - name: Smoke-test Functions bundle
        working-directory: firebase/functions
        run: npm run smoke

  rules_tests:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: firebase/rules-tests/package-lock.json

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install firebase-tools
        run: npm install -g firebase-tools@^15.0.0

      - name: Install rules-tests dependencies
        working-directory: firebase/rules-tests
        run: npm ci

      - name: Run rules tests against Firestore emulator
        working-directory: firebase/rules-tests
        run: npm run emulators:exec

  firestore_emulator_integration_test:
    name: Firestore emulator integration test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: '3.41.x'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev xvfb

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install firebase-tools
        run: npm install -g firebase-tools@^15.0.0

      - name: Run integration tests against Firestore emulator
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
        run: >
          firebase emulators:exec
          --config firebase/firebase.json
          --only firestore
          --project demo-pickllist
          "xvfb-run flutter test integration_test/firestore_picking_list_repository_emulator_test.dart -d linux"

  windows_build:
    name: Build Windows app
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: '3.41.x'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build Windows app
        run: flutter build windows --debug

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: windows-debug-build
          path: build/windows/x64/runner/Debug/
          if-no-files-found: error

  android_build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: '3.41.x'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build debug Android APK
        run: flutter build apk --debug

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
