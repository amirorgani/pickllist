name: pickllist
description: "Agricultural picking list manager for farms — mobile app for workers, Windows app for the work manager."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # I18n / formatting
  intl: any

  # Data modeling
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  collection: ^1.19.0

  # UI
  cupertino_icons: ^1.0.8

  # Firebase — wired in when Firebase project is created (see docs/setup.md).
  # Packages are pinned here to make `flutterfire configure` drop-in.
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_messaging: ^15.1.5

  # Logging
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

  # Testing
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.1.0
  firebase_auth_mocks: ^0.14.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
